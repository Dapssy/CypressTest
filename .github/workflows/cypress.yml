name: Cypress Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'  # runs every day at 9 AM

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cypress run in Chrome
        uses: cypress-io/github-action@v6
        with:
          browser: chrome

      - name: Upload screenshots (if tests fail)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: cypress/screenshots

      - name: Upload videos (if tests fail)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: cypress/videos